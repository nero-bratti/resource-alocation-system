name: Run DB migrations

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Compose
        uses: docker/setup-buildx-action@v2

      - name: Start Postgres
        run: |
          docker compose up -d postgres

      - name: Wait for Postgres readiness
        run: |
          for i in {1..30}; do
            docker run --rm --network host postgres:15 pg_isready -h localhost -p 5432 && break || sleep 2
          done

      - name: Run Flyway migrations via docker-compose
        run: |
          docker compose run --rm flyway

      - name: Tear down
        if: always()
        run: |
          docker compose down -v
