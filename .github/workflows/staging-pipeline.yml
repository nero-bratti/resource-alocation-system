name: Staging Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build-status: success
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build Java services
        run: |
          mvn -B -T 1C -pl config-server,discovery-server,gateway-service,resource-catalog-service,booking-service,permission-service -am package -DskipTests

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run Java tests
        run: |
          mvn -B -T 1C -pl config-server,discovery-server,gateway-service,resource-catalog-service,booking-service,permission-service -am test

  deploy-staging:
    needs: test
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Mock staging deploy
        run: |
          echo "Staging pipeline: deploy step is mocked for now."
          echo "No real staging environment is configured yet."
          echo "This step will be replaced with a real deploy in a future iteration."
