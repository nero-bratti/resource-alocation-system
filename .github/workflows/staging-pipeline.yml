name: Staging Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build Java services
        run: |
          mvn -B -T 1C -pl config-server,discovery-server,gateway-service,resource-catalog-service,booking-service,permission-service -am package -DskipTests

      - name: Start local stack
        run: |
          docker compose up -d postgres keycloak config-server discovery-server gateway-service resource-catalog-service booking-service permission-service frontend

      - name: Wait for services
        run: |
          for i in {1..30}; do
            curl -fsS http://localhost:8080/actuator/health >/dev/null 2>&1 && break
            sleep 5
          done

      - name: Smoke test gateway
        run: |
          curl -fsS http://localhost:8080/actuator/health

      - name: Tear down
        if: always()
        run: |
          docker compose down -v
