global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'spring-boot'
    static_configs:
      - targets: ['gateway-service:8080', 'resource-catalog-service:8082', 'booking-service:8083', 'permission-service:8084', 'notification-service:8085', 'discovery-server:8761', 'config-server:8888']
    metrics_path: '/actuator/prometheus'

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:4317']
