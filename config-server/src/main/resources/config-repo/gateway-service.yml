spring:
  application:
    name: gateway-service
  cloud:
    discovery:
      enabled: true
    eureka:
      client:
        serviceUrl:
          defaultZone: http://discovery-server:8761/eureka/
        register-with-eureka: true
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: databank
          uri: lb://resource-catalog-service
          predicates:
            - Path=/api/databank/**
        - id: resource-catalog
          uri: lb://resource-catalog-service
          predicates:
            - Path=/api/resource-catalog/**
        - id: booking
          uri: lb://booking-service
          predicates:
            - Path=/api/bookings/**
        - id: permissions
          uri: lb://permission-service
          predicates:
            - Path=/api/permissions/**

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8080

spring:
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: gateway-client
            client-secret: gateway-secret
            authorization-grant-type: authorization_code
            redirect-uri: '{baseUrl}/login/oauth2/code/{registrationId}'
            scope:
              - openid
              - profile
              - email
        provider:
          keycloak:
            issuer-uri: http://keycloak:8080/realms/resource-allocation
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/resource-allocation
